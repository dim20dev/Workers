<!DOCTYPE html>
<html>
<head>
  <title>Waiter Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    input[type="text"] {
      border: none;
      width: 70%;
      font-size: 16px;
      background: transparent;
    }

    input[type="checkbox"] {
      transform: scale(1.3);
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin: 5px;
      font-weight: bold;
      width: 100%;
    }

    .green { background: #28a745; color: white; }
    .blue { background: #007bff; color: white; }
    .orange { background: #ffc107; }
    .gray { background: #6c757d; color: white; }
    .purple { background: #6f42c1; color: white; }

  </style>
</head>

<body>

<div class="card">
  <h2 id="date"></h2>
</div>

<div class="card" id="list"></div>

<div class="card">
  <button class="green" onclick="saveData()">Save</button>
  <button class="blue" onclick="viewPast()">Past Records</button>
  <button class="orange" onclick="editNames()">Edit Names</button>
  <button class="purple" onclick="monthlyReport()">Monthly Report</button>
  <button class="gray" onclick="backupData()">Backup All Data</button>
  <input type="file" onchange="restoreData(event)">
</div>

<div class="card" id="past"></div>

<script>

// USE SAFE DATE FORMAT
const today = new Date().toISOString().slice(0,10);
document.getElementById("date").innerText = today;

// DEFAULT NAMES
let waiterNames = JSON.parse(localStorage.getItem("waiterNames")) || [
  "John","Mike","Anna","Chris","Maria",
  "George","Nick","Sofia","Peter","Helen",
  "Alex","Katerina","Paul","Andreas","Elena"
];

const listDiv = document.getElementById("list");

// RENDER LIST
function renderList() {
  listDiv.innerHTML = "";
  waiterNames.forEach((name, i) => {
    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
      <input type="text" value="${name}" id="name${i}">
      <input type="checkbox" id="check${i}">
    `;

    listDiv.appendChild(div);
  });
}

renderList();

// SAVE
function saveData() {
  let data = [];

  for (let i = 0; i < waiterNames.length; i++) {
    const name = document.getElementById(`name${i}`).value;
    const worked = document.getElementById(`check${i}`).checked;

    data.push({ name, worked });
    waiterNames[i] = name;
  }

  localStorage.setItem(today, JSON.stringify(data));
  localStorage.setItem("waiterNames", JSON.stringify(waiterNames));

  // SAVE FILE BACKUP
  saveToFile({ date: today, data });

  alert("Saved!");
}

// SAVE FILE (REAL STORAGE)
function saveToFile(record) {
  const blob = new Blob([JSON.stringify(record, null, 2)], {
    type: "application/json"
  });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `waiters_${today}.json`;
  a.click();
}

// VIEW PAST
function viewPast() {
  const pastDiv = document.getElementById("past");
  pastDiv.innerHTML = "<h3>Past Records</h3>";

  for (let key in localStorage) {
    if (key !== "waiterNames") {
      const btn = document.createElement("button");
      btn.innerText = key;

      btn.onclick = () => {
        const data = JSON.parse(localStorage.getItem(key));
        showRecord(key, data);
      };

      pastDiv.appendChild(btn);
    }
  }
}

// SHOW RECORD
function showRecord(date, data) {
  let text = `<h3>${date}</h3>`;

  data.forEach(w => {
    text += `<p>${w.name} - ${w.worked ? "Worked" : "Absent"}</p>`;
  });

  document.getElementById("past").innerHTML = text;
}

// EDIT NAMES
function editNames() {
  const newNames = prompt("Enter names separated by comma:", waiterNames.join(","));

  if (newNames) {
    waiterNames = newNames.split(",").map(n => n.trim());
    localStorage.setItem("waiterNames", JSON.stringify(waiterNames));
    renderList();
  }
}

// MONTHLY REPORT
function monthlyReport() {
  let counts = {};

  for (let key in localStorage) {

    if (key === "waiterNames") continue;

    let date = new Date(key);
    let now = new Date();

    if (date.getMonth() === now.getMonth() &&
        date.getFullYear() === now.getFullYear()) {

      const data = JSON.parse(localStorage.getItem(key));

      data.forEach(w => {
        if (w.worked) {
          counts[w.name] = (counts[w.name] || 0) + 1;
        }
      });
    }
  }

  let monthName = new Date().toLocaleString('default', { month: 'long' });
  let content = `<h2>${monthName} Report</h2>`;

  for (let name in counts) {
    content += `<p>${name} - ${counts[name]} days</p>`;
  }

  const blob = new Blob(['\ufeff', content], {
    type: 'application/msword'
  });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${monthName}_report.doc`;
  a.click();
}

// BACKUP ALL DATA
function backupData() {
  const data = JSON.stringify(localStorage);

  const blob = new Blob([data], { type: "application/json" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "backup_all.json";
  a.click();
}

// RESTORE DATA
function restoreData(event) {
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    const data = JSON.parse(e.target.result);

    for (let key in data) {
      localStorage.setItem(key, data[key]);
    }

    alert("Restored!");
    location.reload();
  };

  reader.readAsText(file);
}

</script>

</body>
</html>
